<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <h1>Tic Tac Toe</h1>

    <div class="setup-screen" id="setup-screen">
        <div class="setup-card">
            <h2>Game Setup</h2>

            <div class="setup-players">
                <div class="setup-player">
                    <h3>Player 1 (X)</h3>
                    <input type="text" id="player1-name" placeholder="Player 1 name">

                    <input type="file" id="player1-avatar" accept="image/*">
                    <img src="/assets/luluco.png" id="player1-preview">
                </div>

                <div class="setup-player">
                    <h3>Player 2 (O)</h3>
                    <input type="text" id="player2-name" placeholder="Player 2 name">

                    <input type="file" id="player2-avatar" accept="image/*">
                    <img src="/assets/luluco.png" id="player2-preview">
                </div>
            </div>

            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <div class="main hidden" id="main-game">
        <div class="message" id="message">It's X's turn</div>

        <div class="player1">
            <img src="/assets/luluco.png" id="player1-img">
            <h2 id="player1-display">Player 1</h2>
            <p>Score : <span id="score-x">0</span></p>
            <p>Sign : X</p>
        </div>

        <div class="gameboard">
            <div class="field" data-index="0"></div>
            <div class="field" data-index="1"></div>
            <div class="field" data-index="2"></div>
            <div class="field" data-index="3"></div>
            <div class="field" data-index="4"></div>
            <div class="field" data-index="5"></div>
            <div class="field" data-index="6"></div>
            <div class="field" data-index="7"></div>
            <div class="field" data-index="8"></div>
        </div>

        <div class="player2">
            <img src="/assets/luluco.png" id="player2-img">
            <h2 id="player2-display">Player 2</h2>
            <p>Score : <span id="score-o">0</span></p>
            <p>Sign : O</p>
        </div>

        <div class="reset-container">
            <button class="reset-btn" id="reset-btn">Restart</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
