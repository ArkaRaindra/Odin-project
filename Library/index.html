<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
  <title>Library</title>
</head>
<body>

  <h1>Library</h1>

  <dialog id="bookDialog">
    <form id="bookForm">
      <h2>Add Book</h2>

      <label>
        Title
        <input type="text" id="title" required />
      </label>

      <label>
        Author
        <input type="text" id="author" required />
      </label>

      <label>
        Pages
        <input type="number" id="pages" required />
      </label>

      <label>
        Description
        <textarea id="desc"></textarea>
      </label>

      <label>
        Cover Image
        <input type="file" id="cover" accept="image/*" required />
      </label>

      <label class="checkbox">
        <input type="checkbox" id="read" />
        Already Read
      </label>

      <div class="modal-buttons">
        <button type="submit">Add Book</button>
        <button type="button" id="closeBtn">Cancel</button>
      </div>
    </form>
  </dialog>

  <div class="container">
    <div class="cards" id="cards">

      <div class="add">
        <button id="addBookBtn">+</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
