<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator">
        <input class="display" id="display" readonly>
        <div class="buttons">
            <div class="btn-container">
             <button class="btnclear">C</button>
             <button class="btndelete">DEL</button>
             <button class="btnplusminus">+/-</button>
             <button class="btnsquare">^</button>
            </div>
            <div class="btn-container">
                <button class="number">9</button>
                <button class="number">8</button>
                <button class="number">7</button>
                <button class="btndivide">/</button>
            </div>
            <div class="btn-container">
                <button class="number">6</button>
                <button class="number">5</button>
                <button class="number">4</button>
                <button class="btnmultiply">X</button>
            </div>
            <div class="btn-container">
                <button class="number">3</button>
                <button class="number">2</button>
                <button class="number">1</button>
                <button class="btnsubtract">-</button>
            </div>
            <div class="btn-container">
                <button class="coma">.</button>
                <button class="zero">0</button>
                <button class="equal">=</button>
                <button class="btnadd">+</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
