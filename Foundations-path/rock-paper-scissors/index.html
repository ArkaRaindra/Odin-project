<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batu Gunting Kertas</title>
</head>
<body>
    <div class="container">
        <div class="buttons">
            <button id="rock">Rock</button>
            <button id="paper">Paper</button>
            <button id="scissors">Scissors</button>
        </div>
        <div class="result">
            <p id="playerChoice"></p>
            <p id="computerChoice"></p>
            <h2 id="resultText"></h2>
        </div>
        <div class="score">
            <h3>Player: <span id="humanScore">0</span></h3>
            <h3>Computer: <span id="computerScore">0</span></h3>
        </div>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
